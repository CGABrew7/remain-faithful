version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       remainfaithful
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout:  5s
      retries:  10

  server:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST:     postgres
      DB_PORT:     "5432"
      DB_USER:     postgres
      DB_PASSWORD: postgres
      DB_NAME:     remainfaithful
      JWT_SECRET:        change-me-in-production   # override in .env for real deployments
      PORT:              "8080"
      SENDGRID_API_KEY:  ${SENDGRID_API_KEY:-}     # password reset emails
      APNS_KEY_ID:       ${APNS_KEY_ID:-}
      APNS_TEAM_ID:      ${APNS_TEAM_ID:-}
      APNS_PRIVATE_KEY:  ${APNS_PRIVATE_KEY:-}
      APNS_BUNDLE_ID:        ${APNS_BUNDLE_ID:-com.remainfaithful.app}
      APNS_PRODUCTION:       ${APNS_PRODUCTION:-false}
      STRIPE_SECRET_KEY:     ${STRIPE_SECRET_KEY:-}      # Stripe payments
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}  # Stripe webhook verification
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
